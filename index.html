 .navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;

    background: rgba(255, 255, 255, 0.05);

.logo-text {

/* nav links */
.nav-links a {
    margin-left: 30px;
    text-decoration: none;
    color: white;
    font-size: 16px;
    position: relative;
}

/* hover line animation */
.nav-links a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #ff66b2;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}
    .floating {

.icon1 { top: 10%; left: 10%; }

.icon3 { top: 20%; right: 10%; }
.icon4 { bottom: 10%; right: 20%; }

@keyframes floatIcon {
    0% { transform: translateY(0); }

body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background-image: 
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveGrid 20s linear infinite;
    z-index: 0;
}

/* ANIMATION GRID GERAK */
@keyframes moveGrid {
    0% {
        transform: translate(0, 0);
    }
    100% {
        transform: translate(50px, 50px);
    }
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #95205d;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* Container */
.container {
    text-align: center;
    position: relative;
    z-index: 2;
}
/* container */
.shapes {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 1;
}

/* common */
.shape {
    position: absolute;
    opacity: 0.15;
    animation: floatShape 10s infinite ease-in-out;
}

/* TRIANGLE */
.tri {
    width: 0;
    height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 60px solid #ff66b2;
    top: 20%;
    left: 10%;
}

/* CIRCLE */
.circle {
    width: 40px;
    height: 40px;
    background: #ffffff;
    border-radius: 50%;
    top: 60%;
    left: 20%;
}

/* SQUARE */
.square {
    width: 40px;
    height: 40px;
    background: #ff1a8c;
    top: 30%;
    right: 15%;
}

/* EXTRA SHAPES */
.tri2 {
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 40px solid #ffffff;
    bottom: 20%;
    right: 25%;
}

.circle2 {
    width: 30px;
    height: 30px;
    background: #ff66b2;
    border-radius: 50%;
    top: 10%;
    right: 40%;
}

/* FLOAT + PECAH EFFECT */
@keyframes floatShape {
    0% {
        transform: translateY(0) scale(1) rotate(0deg);
    }
    50% {
        transform: translateY(-30px) scale(1.3) rotate(180deg);
    }
    100% {
        transform: translateY(0) scale(1) rotate(360deg);
    }
}

/* LOGO */
.logo {
    font-size: 30px;
    font-weight: bold;
    letter-spacing: 2px;
    animation: glow 2s infinite alternate, float 4s ease-in-out infinite;
}

/* Glow effect */
@keyframes glow {
    from {
        text-shadow: 0 0 10px #fff,
                     0 0 20px #ff4da6,
                     0 0 30px #ff4da6;
    }
    to {
        text-shadow: 0 0 20px #fff,
                     0 0 40px #ff1a8c,
                     0 0 60px #ff1a8c;
    }
}

/* Floating motion */
@keyframes float {
    0% { transform: translateY(0px);}
    50% { transform: translateY(-10px);}
    100% { transform: translateY(0px);}
}

/* Title */
h1 {
    margin-top: 20px;
    font-size: 36px;
    color: #f5d0e6;
    animation: fadeIn 2s ease;
}

/* Text */
p {
    margin-top: 20px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    font-size: 18px;
    line-height: 1.5;
    animation: fadeIn 3s ease;
}

/* Button */
.btn {
    margin-top: 40px;
    padding: 15px 40px;
    background: linear-gradient(45deg, #6a11cb, #2575fc);
    border: none;
    border-radius: 30px;
    font-size: 20px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    animation: fadeIn 4s ease;
    position: relative;
    overflow: hidden;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #fff;
}

/* Background shapes */
.shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
}

.shape2 {

.shape3 {

}

@keyframes fadeIn {
    from {

body.fade-out {

.cursor-glow {
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,102,178,0.3) 0%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;
}
/* ripple */
.ripple::after {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
}

.ripple:active::after {
    width: 200px;
    height: 200px;
    opacity: 1;
    transition: 0s;
}
body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.4));
    z-index: 0;
}
#preloader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #95205d;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader {
    width: 60px;
    height: 60px;
    border: 5px solid rgba(255,255,255,0.2);
    border-top: 5px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
.reveal {
    opacity: 0;
    transform: translateY(50px);
    animation: revealText 1.5s ease forwards;
}

@keyframes revealText {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
